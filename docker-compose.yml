version: "3.8"
services:
  anime-triage:
    build: .
    container_name: anime-triage
    ports:
      - "${APP_PORT:-8765}:8765"
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
    volumes:
      - ${HOST_DOWNLOAD_DIR:-/mnt/user/hentaidisk/Downloads}:/downloads
      - ${HOST_STORAGE_DIR:-/mnt/user/hentaidisk/video/anime}:/anime
      - ${HOST_JELLYFIN_LINK_DIR:-/mnt/user/hentaidisk/video/link}:/jellyfin
      - ./config:/app/config
      - ./logs:/app/logs
      - ./state.json:/app/state.json
      - ./user-config:/home/abc/.config/anime_renamer
    restart: unless-stopped
